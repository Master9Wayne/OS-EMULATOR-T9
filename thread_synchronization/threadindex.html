<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <title>Thread Synchronization</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <hr class="navbar-divider">

  <div class="jumbotron">
    <h1 class="display-4">Thread Synchronization</h1>
    <hr class="my-4">
    <p class="lead">This simulation demonstrates thread synchronization using JavaScript. When two threads attempt to access a shared resource, a lock ensures that only one accesses it at a time, maintaining data consistency and avoiding race conditions.</p>
    
    <div class="container">
      <p><strong>Shared Counter:</strong> <span id="counter">0</span></p>
      <button class="ipc-button" onclick="startThreads()">Start Threads</button>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script src="thread.js"></script>
</body>
</html>
